<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Arapp - TikTok Downloader</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>


    <div class="background"></div>


    <main class="container">

        <div class="logo">
            <span>Ara</span>pp
        </div>


        <h1>
            TikTok Downloader
        </h1>


        <p class="subtitle">
            Download video TikTok tanpa ribet dengan cepat dan mudah.
        </p>



        <div class="download-box">

            <input 
                type="text" 
                placeholder="Tempel link TikTok di sini..."
            >


            <button>
                Download
            </button>

        </div>



        <div class="info">

            <div class="card">

                <h3>⚡ Cepat</h3>

                <p>
                    Proses download menggunakan server otomatis.
                </p>

            </div>



            <div class="card">

                <h3>🎵 MP3</h3>

                <p>
                    Ambil audio TikTok dengan mudah.
                </p>

            </div>



            <div class="card">

                <h3>📹 Video</h3>

                <p>
                    Download video tanpa watermark.
                </p>

            </div>


        </div>


        <footer>

            © 2026 @_seaseann. TikTok Downloader

        </footer>


    </main>



<script src="script.js"></script>

</body>
</html>
